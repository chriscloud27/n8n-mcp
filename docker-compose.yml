# docker-compose.yml
# For optimized builds with BuildKit, use: docker-compose -f docker-compose.buildkit.yml up
version: '3.8'

services:
  n8n-mcp:
    image: ghcr.io/czlonkowski/n8n-mcp:latest
    container_name: n8n-mcp
    restart: unless-stopped

    environment:
      MCP_MODE: ${MCP_MODE:-http}
      AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN is required for HTTP mode}

      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: ${PORT:-3005}

      NODE_DB_PATH: ${NODE_DB_PATH:-/app/data/nodes.db}
      REBUILD_ON_START: ${REBUILD_ON_START:-false}

      TRUST_PROXY: ${TRUST_PROXY:-1}
      WEBHOOK_SECURITY_MODE: ${WEBHOOK_SECURITY_MODE:-permissive}

      # n8n API configuration (enables 16 additional management tools)
      N8N_API_URL: ${N8N_API_URL:?N8N_API_URL is required}
      N8N_API_KEY: ${N8N_API_KEY:?N8N_API_KEY is required}
      N8N_API_TIMEOUT: ${N8N_API_TIMEOUT:-30000}
      N8N_API_MAX_RETRIES: ${N8N_API_MAX_RETRIES:-3}

    volumes:
      - n8n-mcp-data:/app/data

    ports:
      - "${PORT:-3005}:${PORT:-3005}"

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:$${PORT:-3005}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  n8n-mcp-data:
    driver: local